name: ticketalert

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: ticketalert-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Missing POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketalert-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${DOCKER_ConnectionStrings__DefaultConnection}
      Jwt__Key: ${Jwt__Key:?Missing Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer:-TicketAlert}
      Jwt__Audience: ${Jwt__Audience:-TicketAlert}
      Ticketmaster__ApiKey: ${Ticketmaster__ApiKey:-}
      Stripe__SecretKey: ${Stripe__SecretKey:-}
      Stripe__WebhookSecret: ${Stripe__WebhookSecret:-}
      Email__FromAddress: ${Email__FromAddress:-noreply@ticketalert.no}
      Email__SmtpHost: ${Email__SmtpHost:-}
      Email__SmtpPort: ${Email__SmtpPort:-587}
      Email__Username: ${Email__Username:-}
      Email__Password: ${Email__Password:-}
      Pricing__PerWatchNok: ${Pricing__PerWatchNok:-19}
      Cors__Origins: ${Cors__Origins:-http://localhost:5173}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketalert-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: "" # Uses nginx proxy, no direct env needed

volumes:
  postgres_data:
